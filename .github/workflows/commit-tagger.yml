# This is a basic workflow to help you get started with Actions
name: Commit Tagger
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
            echo "tagging commit..."
            latestTag=$(git tag --sort=-v:refname | head -n 1);
            version=${latestTag#v};
            commitMessage="${{ github.event.head_commit.message }}";
            IFS="." read release feature patch <<< "$version";

            if [[ $commitMessage == "release:"* ]]; then
              release=$((release + 1));
              feature=0;
              patch=0;
            elif [[ $commitMessage == "feature:"* ]]; then
              feature=$((feature + 1));
              patch=0;
            else
              patch=$((patch + 1));
            fi

            newVersionTag="v$release.$feature.$patch";
            git tag $newVersionTag;
            git push origin $newVersionTag;
