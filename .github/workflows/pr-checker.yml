name: PR Title Check

on:
  pull_request:
    branches: ["main"]

jobs:
  check-title:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title format
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          if [[ "$TITLE" == release:* || "$TITLE" == feature:* || "$TITLE" == patch:* ]]; then
            echo "Valid title. proceed"
          else
            echo "bro READ THE README"
            echo "Title must start with: release:, feature:, or patch:"
            exit 1
          fi
